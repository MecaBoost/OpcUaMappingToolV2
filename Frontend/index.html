<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur OPC UA (V2)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
    <div class="container d-flex align-items-center">
        <i class="bi bi-cpu fs-3 me-3"></i>
        <h3 class="m-0 fw-bold text-white">OpcUa Mapping Tool <span class="badge bg-primary ms-2 fs-6 rounded-pill">V2</span></h3>
    </div>
</header>

<div class="container main-container mt-4 mb-5">
    
    <div class="card p-4 mb-4">
        <h5 class="card-title mb-4">
            <div class="step-badge">1</div> 
            Importation des documents source
        </h5>
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label text-muted"><i class="bi bi-braces me-1"></i> Variables Databus (JSON)</label>
                <input type="file" id="jsonInput" class="form-control file-input" accept=".json" />
                <span id="jsonStatus" class="small mt-2 d-block status-text"></span>
            </div>
            <div class="col-md-6">
                <label class="form-label text-muted"><i class="bi bi-code-slash me-1"></i> Modèle Equipement (XML)</label>
                <input type="file" id="xmlInput" class="form-control file-input" accept=".xml" />
                <span id="xmlStatus" class="small mt-2 d-block status-text"></span>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h5 class="card-title mb-4">
            <div class="step-badge">2</div> 
            Construction des liaisons
        </h5>
        <div class="table-responsive">
            <table class="table align-middle custom-table">
                <thead>
                    <tr>
                        <th>Équipement (XML)</th>
                        <th>Connexion Databus (JSON)</th>
                        <th>Préfixe des variables (JSON)</th>
                        <th style="width: 60px;" class="text-center">Action</th>
                    </tr>
                </thead>
                
                <tbody id="mappingTableBody">
                    </tbody>
                
                <tbody class="input-row">
                    <tr>
                        <td>
                            <select id="xmlSelect" class="form-select form-select-sm">
                                <option value="">-- Choisir un équipement --</option>
                            </select>
                        </td>
                        <td>
                            <select id="connSelect" class="form-select form-select-sm">
                                <option value="">-- Choisir une connexion --</option>
                            </select>
                        </td>
                        <td>
                            <select id="prefixSelect" class="form-select form-select-sm" disabled>
                                <option value="">-- Choisir un préfixe --</option>
                            </select>
                        </td>
                        <td class="text-center">
                            <button id="btnAddMapping" class="btn btn-action btn-success" title="Ajouter le mapping">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <button id="btnGenerate" class="btn btn-primary w-100 py-3 shadow-lg d-flex justify-content-center align-items-center gap-2">
        <i class="bi bi-cloud-download fs-5"></i> Lancer le Mapping Final et Télécharger
    </button>

    <div id="resultMessage" class="d-none alert mt-4 text-center shadow-sm"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
