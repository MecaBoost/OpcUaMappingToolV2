<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur OPC UA (V2)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4 mb-5" style="max-width: 1000px;">
    <h2 class="text-center mb-4">Générateur de Mapping OPC UA (API REST)</h2>
    
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="card-title text-primary mb-3">1. Documents source</h5>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Variables Databus (JSON)</label>
                <input type="file" id="jsonInput" class="form-control" accept=".json" />
                <span id="jsonStatus" class="small mt-1 d-block"></span>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Modèle Equipement (XML)</label>
                <input type="file" id="xmlInput" class="form-control" accept=".xml" />
                <span id="xmlStatus" class="small mt-1 d-block"></span>
            </div>
        </div>
    </div>

    <div class="card p-4 shadow-sm mb-4">
        <h5 class="card-title text-primary mb-3">2. Construction des liaisons</h5>
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-light">
                <tr>
                    <th>Équipement (XML)</th>
                    <th>Connexion Databus (JSON)</th>
                    <th>Préfixe des variables (JSON)</th>
                    <th style="width: 50px;"></th>
                </tr>
            </thead>
            
            <tbody id="mappingTableBody">
            </tbody>
            
            <tbody>
                <tr>
                    <td>
                        <select id="xmlSelect" class="form-select form-select-sm">
                            <option value="">-- Choisir un équipement --</option>
                        </select>
                    </td>
                    <td>
                        <select id="connSelect" class="form-select form-select-sm">
                            <option value="">-- Choisir une connexion --</option>
                        </select>
                    </td>
                    <td>
                        <select id="prefixSelect" class="form-select form-select-sm" disabled>
                            <option value="">-- Choisir un préfixe --</option>
                        </select>
                    </td>
                    <td class="text-center">
                        <button id="btnAddMapping" class="btn btn-sm btn-success">+</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <button id="btnGenerate" class="btn btn-primary w-100 py-3 fs-5 shadow">
        Lancer le Mapping Final et Télécharger
    </button>

    <div id="resultMessage" class="d-none alert mt-4 text-center fs-5 shadow-sm"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
